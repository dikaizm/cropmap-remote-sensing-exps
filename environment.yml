name: cropmap
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  # Geospatial (conda-forge for GDAL compatibility)
  - rasterio>=1.3
  - geopandas>=1.0
  - pyproj>=3.6
  - shapely>=2.0
  - rioxarray>=0.15
  - pystac-client>=0.7
  # Core scientific
  - numpy>=1.26
  - pandas>=2.0
  - scipy>=1.11
  - scikit-learn>=1.3
  - scikit-image>=0.22
  - matplotlib>=3.7
  - pillow>=10.0
  # Utilities
  - python-dotenv
  - tqdm
  - pyyaml
  - click
  - requests
  - pip
  - pip:
    # PyTorch (CPU default; swap index-url for CUDA on GPU server)
    - torch>=2.1
    - torchvision>=0.16
    # ML
    - segmentation-models-pytorch>=0.3
    - timm>=0.9
    - pytorch-lightning>=2.0
    - torchmetrics>=1.0
    - einops
    # MLflow
    - mlflow>=2.10
    # GDrive / Google APIs
    - google-api-python-client>=2.100
    - google-auth>=2.20
    - google-auth-oauthlib>=1.0
    - gdown>=5.0
    # Misc pipeline deps
    - huggingface_hub>=0.20
    - safetensors>=0.4
    - pystac>=1.8
    - leafmap>=0.30
    - torchgeo>=0.5
